name: Bank Frontend CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev-branch

permissions:
  id-token: write
  contents: write

jobs:
  # ====================================================
  # STAGE 1: CONTINUOUS INTEGRATION (CI)
  # ====================================================
  continuous_integration:
    name: Code Build & ECR Push
    runs-on: ubuntu-latest
    outputs:
      ecr_registry: ${{ steps.login-ecr.outputs.registry }} # Saves registry name for Stage 2
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-north-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, Tag, and Push Image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: bank-frontend
        IMAGE_TAG: sha-${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  # ====================================================
  # STAGE 2: GITOPS DEPLOYMENT (CD)
  # ====================================================
  gitops_deployment:
    name: Sync Kubernetes Manifest Repo
    runs-on: ubuntu-latest
    needs: continuous_integration 

    if: github.ref == 'refs/heads/main' # Only run this job on main branch
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Update Kubernetes Manifest Git Repository
      env:
        MANIFEST_REPO: Kryptcloud/Bank_kubernetes-manifest
        IMAGE_TAG: sha-${{ github.sha }}
        # Pulls the ECR address output saved from Stage 1
        ECR_REGISTRY: ${{ needs.continuous_integration.outputs.ecr_registry }} 
      run: |
        # 1. Download the separate manifest repository
        git clone https://x-access-token:${{ secrets.MANIFEST_REPO_PAT }}@://github.com/Kryptcloud/Bank_kubernetes-manifest.git manifest-dir
        cd manifest-dir
        
        # 2. Swap out the placeholder image string with your real cloud image path
        sed -i "s|image: nginx:alpine-frontend-bootstrap|image: $ECR_REGISTRY/bank-frontend:$IMAGE_TAG|g" deployment.yaml
        
        # 3. Save, commit, and push the automated change back up to GitHub
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add deployment.yaml
        git commit -m "Automated Pipeline Update: Upgraded frontend to image tag $IMAGE_TAG [skip ci]"
        git push origin main
