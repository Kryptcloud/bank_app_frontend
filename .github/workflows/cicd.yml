name: Bank Frontend CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev-branch
    paths-ignore:
      - '**.md'
      - 'docs/**'

permissions:
  id-token: write
  contents: write

jobs:
  # ===================================================
  # STAGE 1: CONTINUOUS INTEGRATION (CI)
  # ===================================================
  continuous_integration:
    name: Code Build & ECR Push
    runs-on: ubuntu-latest
    outputs:
      ecr_registry: ${{ steps.login-ecr.outputs.registry }} # Saves registry name for Stage 2
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-north-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: set up QEMU
      uses: docker/setup-qemu-action@v2

    - name: set up Docker Buildx
      uses: docker/setup-buildx-action@v2


    - name: Build, Tag, and Push Image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: bank-frontend
        IMAGE_TAG: sha-${{ github.sha }}
      run: |
        docker buildx build --platform linux/arm64 \
         -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
         --push .
        

  # ====================================================
  # STAGE 2: GITOPS DEPLOYMENT (CD)
  gitops_deployment:
    name: Sync Kubernetes Manifest Repo
    runs-on: ubuntu-latest
    needs: continuous_integration

    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout Manifest Repo
      uses: actions/checkout@v4
      with:
        repository: Kryptcloud/Bank_kubernetes-manifest
        token: ${{ secrets.MANIFEST_REPO_PAT }}
        path: manifest-dir

    - name: Update deployment image and push
      env:
        ECR_REGISTRY: ${{ needs.continuous_integration.outputs.ecr_registry }}
        ECR_REPOSITORY: bank-frontend
        IMAGE_TAG: sha-${{ github.sha }}
      run: |
        cd manifest-dir
        sed -i -E "s|image: .*bank-frontend:.*|image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG # Placeholder until Frontend CI runs|g" deployment.yaml
      

        if git status --porcelain | grep .; then
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployment.yaml
          git commit -m "Automated Pipeline Update: Upgraded frontend to image tag $IMAGE_TAG [skip ci]"
          git push origin main
        else
          echo "No changes to commit — placeholder image string not found or already updated"
          fi
          
